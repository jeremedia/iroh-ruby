name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby: ["3.2", "3.4"]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bundle exec rake test
      - run: bundle exec rake demo:ticket_exchange
      - run: bundle exec rake demo:connection_telemetry
      - run: bundle exec rake demo:protocol_router
      - run: bundle exec rake demo:endpoint_watchers
      - run: bundle exec rake demo:services_diagnostics
      - run: bundle exec rake smoke:installed_gem
